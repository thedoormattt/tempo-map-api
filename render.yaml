services:
  - type: web
    name: tempo-map-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false   # set this manually in the Render dashboard to your Vercel URL
    autoDeploy: true
